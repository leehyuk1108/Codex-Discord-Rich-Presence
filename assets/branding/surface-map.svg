<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 420" role="img" aria-labelledby="title desc">
  <title id="title">Why This Runtime</title>
  <desc id="desc">True-black runtime overview with clear decision flow and minimal copy.</desc>

  <rect width="1280" height="420" fill="#000000"/>
  <rect x="24" y="24" width="1232" height="372" rx="24" fill="#000000" stroke="#262626"/>

  <text x="640" y="78" fill="#ffffff" font-size="42" font-family="Segoe UI, Arial, sans-serif" font-weight="700" text-anchor="middle">Why This Runtime</text>
  <text x="640" y="110" fill="#bdbdbd" font-size="20" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">One binary. Surface-aware routing. Stable Discord presence.</text>

  <line x1="430" y1="150" x2="430" y2="338" stroke="#2f2f2f"/>
  <line x1="850" y1="150" x2="850" y2="338" stroke="#2f2f2f"/>

  <text x="220" y="186" fill="#ffffff" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" text-anchor="middle">Surface Aware</text>
  <text x="220" y="228" fill="#d0d0d0" font-size="22" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">Detects Codex CLI</text>
  <text x="220" y="260" fill="#d0d0d0" font-size="22" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">VS Code Extension</text>
  <text x="220" y="292" fill="#d0d0d0" font-size="22" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">and Codex App desktop</text>

  <text x="640" y="186" fill="#ffffff" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" text-anchor="middle">Deterministic Routing</text>
  <text x="640" y="228" fill="#d0d0d0" font-size="21" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">1) originator contains desktop</text>
  <text x="640" y="260" fill="#d0d0d0" font-size="21" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">2) fallback to source contains desktop</text>
  <text x="640" y="292" fill="#d0d0d0" font-size="21" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">3) otherwise use Codex CLI profile</text>

  <text x="1060" y="186" fill="#ffffff" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700" text-anchor="middle">Reliable Presence</text>
  <text x="1060" y="228" fill="#d0d0d0" font-size="22" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">Low-overhead polling</text>
  <text x="1060" y="260" fill="#d0d0d0" font-size="22" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">Deduplicated payload updates</text>
  <text x="1060" y="292" fill="#d0d0d0" font-size="22" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">Reconnect backoff for IPC</text>

  <line x1="120" y1="338" x2="1160" y2="338" stroke="#3a3a3a" stroke-opacity="0.6"/>
  <text x="640" y="370" fill="#9f9f9f" font-size="18" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">Client IDs and assets are selected automatically per active surface.</text>
</svg>
